<!DOCTYPE html>

<head>

  <title>服务器运维工具</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<body>

<!-- 顶部导航 -->
<nav class="navbar navbar-dark top-navbar px-3">

    <div class="text-white">

<div class="d-flex">
